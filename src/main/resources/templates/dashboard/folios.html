<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Folios & Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('folios')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Folios & Payments</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-4">
                    <div class="card-header">Lookup Folio</div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label">Reservation ID</label>
                                <input type="text" class="form-control" id="lookup-res-id" placeholder="Enter reservation ID">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-primary" id="btn-lookup">Search</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="folio-section" style="display:none">
                    <div class="row g-4">
                        <div class="col-md-8">
                            <div class="card mb-3">
                                <div class="card-header d-flex justify-content-between">
                                    <span>Folio Details</span>
                                    <div>
                                        <button class="btn btn-sm btn-outline-success me-1" id="btn-post-charge"><i class="bi bi-plus"></i> Post Charge</button>
                                        <button class="btn btn-sm btn-outline-primary me-1" id="btn-process-payment"><i class="bi bi-credit-card"></i> Payment</button>
                                        <button class="btn btn-sm btn-outline-dark" id="btn-close-folio">Close Folio</button>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="row mb-3">
                                        <div class="col"><strong>Guest:</strong> <span id="folio-guest"></span></div>
                                        <div class="col"><strong>Status:</strong> <span id="folio-status"></span></div>
                                        <div class="col"><strong>Total:</strong> ₹<span id="folio-total"></span></div>
                                        <div class="col"><strong>Currency:</strong> <span id="folio-currency"></span></div>
                                    </div>

                                    <h6>Charges</h6>
                                    <table class="table table-sm">
                                        <thead><tr><th>Description</th><th>Type</th><th>Amount</th><th>Posted</th></tr></thead>
                                        <tbody id="charges-body"></tbody>
                                    </table>

                                    <h6 class="mt-3">Payments</h6>
                                    <table class="table table-sm">
                                        <thead><tr><th>Method</th><th>Amount</th><th>Status</th><th>Paid At</th></tr></thead>
                                        <tbody id="payments-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Post Charge Modal -->
    <div class="modal fade" id="chargeModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Post Charge</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Description *</label><input type="text" class="form-control" id="charge-desc"></div>
                    <div class="mb-3"><label class="form-label">Amount (₹) *</label><input type="number" class="form-control" id="charge-amount" step="0.01"></div>
                    <div class="mb-3"><label class="form-label">Type *</label>
                        <select class="form-select" id="charge-type">
                            <option value="ROOM_CHARGE">Room Charge</option>
                            <option value="RESTAURANT">Restaurant</option>
                            <option value="MINIBAR">Minibar</option>
                            <option value="INCIDENTAL">Incidental</option>
                            <option value="FEE">Fee</option>
                            <option value="TAX">Tax</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary btn-sm" id="btn-save-charge">Post</button></div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Process Payment</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Amount (₹) *</label><input type="number" class="form-control" id="pay-amount" step="0.01"></div>
                    <div class="mb-3"><label class="form-label">Method *</label>
                        <select class="form-select" id="pay-method">
                            <option value="CASH">Cash</option>
                            <option value="CARD">Card</option>
                            <option value="MOBILE_WALLET">Mobile Wallet</option>
                            <option value="ROOM_CHARGE">Room Charge</option>
                            <option value="VOUCHER">Voucher</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success btn-sm" id="btn-save-payment">Pay</button></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/folios.js"></script>
</body>
</html>

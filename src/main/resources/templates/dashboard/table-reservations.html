<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Reservations - LMRS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('table-reservations')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Table Reservations</span>
                    <button class="btn btn-sm btn-success" id="btn-add-res"><i class="bi bi-plus-lg me-1"></i>New Reservation</button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Table</th>
                                        <th>Guest</th>
                                        <th>Party Size</th>
                                        <th>Date/Time</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="res-body">
                                    <tr><td colspan="6" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resModalTitle">New Reservation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="res-id">
                    <div class="mb-3">
                        <label class="form-label">Table *</label>
                        <select class="form-select" id="res-table" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Guest (optional)</label>
                        <select class="form-select" id="res-guest"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Party Size *</label>
                        <input type="number" class="form-control" id="res-party" min="1" max="20" value="2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date & Time *</label>
                        <input type="datetime-local" class="form-control" id="res-datetime" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Special Notes</label>
                        <textarea class="form-control" id="res-notes" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-res">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/table-reservations.js"></script>
</body>
</html>

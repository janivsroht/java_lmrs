<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Partners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('partners')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Partner API Management</span>
                    <button class="btn btn-success btn-sm" id="btn-add-partner"><i class="bi bi-plus-lg me-1"></i>Add Partner</button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row align-items-center g-2">
                            <div class="col-md-6">
                                <span class="fw-semibold"><i class="bi bi-link-45deg me-1"></i>API Endpoints</span>
                                <span class="badge bg-secondary ms-2">/api/v1/partner/...</span>
                            </div>
                            <div class="col-md-3 text-end">
                                <span class="text-muted small">Active Partners: <strong id="active-count">0</strong></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Name</th>
                                        <th>Provider Type</th>
                                        <th>API Key</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="partner-body">
                                    <tr><td colspan="6" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Partner Modal -->
    <div class="modal fade" id="partnerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="partnerModalLabel">Add Partner</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Partner Name *</label>
                        <input type="text" class="form-control" id="partner-name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Provider Type *</label>
                        <select class="form-select" id="partner-type">
                            <option value="BOOKING_COM">Booking.com</option>
                            <option value="EXPEDIA">Expedia</option>
                            <option value="AIRBNB">Airbnb</option>
                            <option value="AGODA">Agoda</option>
                            <option value="MAKEMYTRIP">MakeMyTrip</option>
                            <option value="CUSTOM">Custom / Direct</option>
                        </select>
                    </div>
                    <div id="partner-key-display" class="mb-3 d-none">
                        <label class="form-label">Generated API Key</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="partner-api-key" readonly>
                            <button class="btn btn-outline-secondary" onclick="copyApiKey()" title="Copy API Key">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>
                        <div class="form-text text-info">Save this key — it will not be shown again after closing.</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-partner">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/partners.js"></script>
</body>
</html>

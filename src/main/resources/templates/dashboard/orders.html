<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('orders')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Orders</span>
                    <button class="btn btn-success btn-sm" id="btn-add-order">
                        <i class="bi bi-plus-lg me-1"></i>New Order
                    </button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row align-items-center g-2">
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filter-status">
                                    <option value="">All Statuses</option>
                                    <option value="OPEN">Open</option>
                                    <option value="SUBMITTED">Submitted</option>
                                    <option value="IN_KITCHEN">In Kitchen</option>
                                    <option value="READY">Ready</option>
                                    <option value="SERVED">Served</option>
                                    <option value="CLOSED">Closed</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-primary" id="btn-filter">Filter</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Order #</th>
                                        <th>Table</th>
                                        <th>Guest</th>
                                        <th>Status</th>
                                        <th>Total</th>
                                        <th>Opened</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="orders-body">
                                    <tr><td colspan="7" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Order Modal -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">New Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Table</label>
                            <select class="form-select" id="order-table"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Guest</label>
                            <select class="form-select" id="order-guest"></select>
                        </div>
                    </div>
                    <label class="form-label fw-semibold">Items</label>
                    <div id="order-items">
                        <div class="row g-2 mb-2 order-item-row">
                            <div class="col-md-5">
                                <select class="form-select form-select-sm item-select"></select>
                            </div>
                            <div class="col-md-2">
                                <input type="number" class="form-control form-control-sm item-qty" value="1" min="1">
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control form-control-sm item-price" placeholder="Price" step="0.01">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-danger btn-remove-item"><i class="bi bi-x"></i></button>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-outline-success mt-1" id="btn-add-item">
                        <i class="bi bi-plus"></i> Add Item
                    </button>
                    <div class="mt-3 text-end fw-bold">Total: ₹<span id="order-total">0.00</span></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="btn-save-order">Create Order</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/orders.js"></script>
</body>
</html>

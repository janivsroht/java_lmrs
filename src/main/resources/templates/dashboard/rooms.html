<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('rooms')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Rooms</span>
                    <button class="btn btn-success btn-sm" id="btn-add-room">
                        <i class="bi bi-plus-lg me-1"></i>Add Room
                    </button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-header">Check Availability</div>
                    <div class="card-body py-2">
                        <div class="row align-items-center g-2">
                            <div class="col-md-3">
                                <input type="date" class="form-control form-control-sm" id="avail-checkin">
                            </div>
                            <div class="col-md-3">
                                <input type="date" class="form-control form-control-sm" id="avail-checkout">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-primary" id="btn-check-avail">Check</button>
                                <button class="btn btn-sm btn-outline-secondary" id="btn-clear-avail">Show All</button>
                            </div>
                            <div class="col-md-4 text-end">
                                <span class="badge bg-success" id="avail-count"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Room #</th>
                                        <th>Type</th>
                                        <th>Floor</th>
                                        <th>Status</th>
                                        <th>Housekeeping</th>
                                        <th>Base Rate</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="rooms-body">
                                    <tr><td colspan="7" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="roomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="roomModalTitle">Add Room</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="room-id">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Room Number *</label>
                            <input type="text" class="form-control" id="room-number" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Room Type *</label>
                            <select class="form-select" id="room-type" required></select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Floor</label>
                            <input type="number" class="form-control" id="room-floor">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Base Rate (₹) *</label>
                            <input type="number" class="form-control" id="room-rate" step="0.01" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-room">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">Delete this room?</div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger btn-sm" id="btn-confirm-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/rooms.js"></script>
</body>
</html>

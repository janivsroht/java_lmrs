<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Housekeeping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('housekeeping')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Housekeeping</span>
                    <button class="btn btn-success btn-sm" id="btn-add-task"><i class="bi bi-plus-lg me-1"></i>New Task</button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row align-items-center g-2">
                            <div class="col-md-3">
                                <label class="form-label mb-0 me-2">Date:</label>
                                <input type="date" class="form-control form-control-sm d-inline-block w-auto" id="filter-date">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-primary" id="btn-filter">Filter</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Room</th>
                                        <th>Task Type</th>
                                        <th>Assigned To</th>
                                        <th>Priority</th>
                                        <th>Status</th>
                                        <th>Scheduled</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tasks-body">
                                    <tr><td colspan="7" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="task-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Room *</label>
                            <select class="form-select" id="task-room" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Task Type *</label>
                            <select class="form-select" id="task-type">
                                <option value="CLEAN">Clean</option>
                                <option value="INSPECTION">Inspection</option>
                                <option value="TURNDOWN">Turndown</option>
                                <option value="MAINTENANCE">Maintenance</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Assigned To (User ID)</label>
                            <input type="text" class="form-control" id="task-assigned">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Priority</label>
                            <select class="form-select" id="task-priority">
                                <option value="LOW">Low</option>
                                <option value="NORMAL" selected>Normal</option>
                                <option value="HIGH">High</option>
                                <option value="URGENT">Urgent</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="task-status">
                                <option value="PENDING">Pending</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="COMPLETED">Completed</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Scheduled Date *</label>
                            <input type="date" class="form-control" id="task-date" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="btn-save-task">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/housekeeping.js"></script>
</body>
</html>

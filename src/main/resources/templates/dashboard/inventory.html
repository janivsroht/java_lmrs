<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('inventory')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Inventory</span>
                    <button class="btn btn-success btn-sm" id="btn-add-item"><i class="bi bi-plus-lg me-1"></i>Add Item</button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row align-items-center g-2">
                            <div class="col-md-3">
                                <button class="btn btn-sm btn-outline-warning" id="btn-low-stock">Show Low Stock Only</button>
                                <button class="btn btn-sm btn-outline-secondary" id="btn-show-all">Show All</button>
                            </div>
                            <div class="col-md-3">
                                <span class="badge bg-warning text-dark" id="low-stock-badge"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Name</th>
                                        <th>Unit</th>
                                        <th>Current Stock</th>
                                        <th>Reorder At</th>
                                        <th>Cost/Unit</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="inv-body">
                                    <tr><td colspan="7" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stock Adjustment Modal -->
    <div class="modal fade" id="stockModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-minus me-1"></i>Adjust Stock</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Current stock: <strong id="stock-current">-</strong></p>
                    <div class="mb-3">
                        <label class="form-label">Quantity *</label>
                        <input type="number" class="form-control" id="stock-quantity" placeholder="+10 to add, -5 to deduct">
                        <div class="form-text">Positive to add stock, negative to deduct</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <input type="text" class="form-control" id="stock-reason" placeholder="e.g. Delivery from supplier">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-info btn-sm" id="btn-confirm-stock">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Item Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalTitle">Add Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="item-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name *</label>
                            <input type="text" class="form-control" id="item-name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Unit *</label>
                            <select class="form-select" id="item-unit">
                                <option value="KG">Kilogram</option>
                                <option value="L">Liter</option>
                                <option value="PCS">Pieces</option>
                                <option value="BOX">Box</option>
                                <option value="BTL">Bottle</option>
                                <option value="LB">Pound</option>
                                <option value="OZ">Ounce</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Current Stock *</label>
                            <input type="number" class="form-control" id="item-stock" step="0.001" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Reorder Threshold *</label>
                            <input type="number" class="form-control" id="item-threshold" step="0.001" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cost Per Unit (₹) *</label>
                            <input type="number" class="form-control" id="item-cost" step="0.01" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="btn-save-item">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/inventory.js"></script>
</body>
</html>

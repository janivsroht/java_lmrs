<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <style>
        .result-box { background: #f8f9fa; border-radius: 0.5rem; padding: 1rem; min-height: 120px; white-space: pre-wrap; }
        .sentiment-badge { font-size: 0.9rem; padding: 0.35rem 0.75rem; }
        .nav-tabs .nav-link { color: #495057; }
        .nav-tabs .nav-link.active { font-weight: 600; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('ai')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">AI Assistant</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <ul class="nav nav-tabs mb-4" id="aiTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="concierge-tab" data-bs-toggle="tab" data-bs-target="#concierge" type="button" role="tab">
                            <i class="bi bi-chat-dots me-1"></i>AI Concierge
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="feedback-tab" data-bs-toggle="tab" data-bs-target="#feedback" type="button" role="tab">
                            <i class="bi bi-chat-quote me-1"></i>Feedback Analysis
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="menu-tab" data-bs-toggle="tab" data-bs-target="#menu" type="button" role="tab">
                            <i class="bi bi-book me-1"></i>Menu Description
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Concierge Tab -->
                    <div class="tab-pane fade show active" id="concierge" role="tabpanel">
                        <div class="card">
                            <div class="card-header">AI Concierge - Respond to Guest Queries</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <label class="form-label">Guest Query</label>
                                        <textarea class="form-control" id="concierge-query" rows="3" placeholder="e.g., Can I get a late checkout tomorrow?"></textarea>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Guest ID (optional)</label>
                                        <input class="form-control" id="concierge-guest" placeholder="guest-id">
                                        <label class="form-label mt-2">Reservation ID (optional)</label>
                                        <input class="form-control" id="concierge-reservation" placeholder="reservation-id">
                                    </div>
                                </div>
                                <button class="btn btn-primary mt-3" id="btn-concierge">
                                    <i class="bi bi-send me-1"></i>Get AI Response
                                </button>
                                <div class="mt-3">
                                    <label class="form-label fw-semibold">AI Reply</label>
                                    <div class="result-box" id="concierge-result">Enter a query and click the button.</div>
                                    <small class="text-muted mt-1 d-block" id="concierge-meta"></small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Feedback Analysis Tab -->
                    <div class="tab-pane fade" id="feedback" role="tabpanel">
                        <div class="card">
                            <div class="card-header">Feedback Analysis - Analyze Guest Reviews</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-8">
                                        <label class="form-label">Guest Feedback</label>
                                        <textarea class="form-control" id="feedback-text" rows="4" placeholder="Paste guest feedback here..."></textarea>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Guest Name (optional)</label>
                                        <input class="form-control" id="feedback-guest" placeholder="Guest name">
                                    </div>
                                </div>
                                <button class="btn btn-primary mt-3" id="btn-feedback">
                                    <i class="bi bi-search me-1"></i>Analyze Feedback
                                </button>
                                <div class="mt-3 row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Sentiment</label>
                                        <div id="feedback-sentiment">-</div>
                                    </div>
                                    <div class="col-md-8">
                                        <label class="form-label fw-semibold">Summary</label>
                                        <div class="result-box" id="feedback-summary" style="min-height:60px">-</div>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label fw-semibold">Suggested Reply</label>
                                        <div class="result-box" id="feedback-reply" style="min-height:80px">-</div>
                                    </div>
                                </div>
                                <small class="text-muted mt-1 d-block" id="feedback-meta"></small>
                            </div>
                        </div>
                    </div>

                    <!-- Menu Description Tab -->
                    <div class="tab-pane fade" id="menu" role="tabpanel">
                        <div class="card">
                            <div class="card-header">Menu Description Generator - AI-Powered Descriptions</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Item Name</label>
                                        <input class="form-control" id="menu-name" placeholder="e.g., Grilled Salmon">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Category</label>
                                        <input class="form-control" id="menu-category" placeholder="e.g., Main Course">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Base Price (₹)</label>
                                        <input class="form-control" id="menu-price" type="number" step="0.01" placeholder="24.99">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Ingredients (comma-separated)</label>
                                        <input class="form-control" id="menu-ingredients" placeholder="salmon, lemon, herbs, butter">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Dietary Flags (comma-separated)</label>
                                        <input class="form-control" id="menu-dietary" placeholder="gluten-free, high-protein">
                                    </div>
                                </div>
                                <button class="btn btn-primary mt-3" id="btn-menu">
                                    <i class="bi bi-magic me-1"></i>Generate Description
                                </button>
                                <div class="mt-3">
                                    <label class="form-label fw-semibold">Generated Description</label>
                                    <div class="result-box" id="menu-result">Fill in the details and generate.</div>
                                    <small class="text-muted mt-1 d-block" id="menu-meta"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ai-assistant.js"></script>
</body>
</html>

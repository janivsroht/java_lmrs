<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMRS - Guests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar('guests')}"></div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
                <div class="container-fluid">
                    <span class="navbar-brand">Guests</span>
                    <button class="btn btn-success btn-sm" id="btn-add-guest">
                        <i class="bi bi-plus-lg me-1"></i>Add Guest
                    </button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <input type="text" class="form-control form-control-sm" id="search-lastname" placeholder="Search by last name...">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-primary" id="btn-search">Search</button>
                                <button class="btn btn-sm btn-outline-secondary" id="btn-clear">Clear</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead class="table-light">
                                    <tr>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Nationality</th>
                                        <th>Loyalty Tier</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="guests-body">
                                    <tr><td colspan="6" class="text-muted text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div id="guests-pagination" class="d-flex justify-content-center mt-3"></div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="guestModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="guestModalTitle">Add Guest</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="guest-id">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="guest-firstname" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="guest-lastname" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="guest-email">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="guest-phone">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="guest-dob">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="guest-nationality">
                        </div>
                        <div class="col-6">
                            <label class="form-label">ID Document Type</label>
                            <select class="form-select" id="guest-idtype">
                                <option value="">None</option>
                                <option value="PASSPORT">Passport</option>
                                <option value="DRIVER_LICENSE">Driver License</option>
                                <option value="NATIONAL_ID">National ID</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">ID Document Number</label>
                            <input type="text" class="form-control" id="guest-idnumber">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-guest">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete this guest?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btn-confirm-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/guests.js"></script>
</body>
</html>
